<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HRTA - Harman Rathi Testing Agency</title>
    <meta name="description" content="Ultra-secure AI-proctored examination platform" />
    <meta name="theme-color" content="#0A0E27" />
    
    <!-- PWA configuration -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/assets/nta_logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('Service Worker registered successfully:', reg.scope))
            .catch(err => console.log('Service Worker registration failed:', err));
        });
      }
    </script>

    <!-- Google reCAPTCHA v3 Loading -->
    <script>
      (function() {
        const siteKey = "%VITE_RECAPTCHA_SITE_KEY%" || '6LePisStAAAAAMrXU7L-BBBSFm2beiH1Os17JqbA';
        const cleanSiteKey = (siteKey && !siteKey.startsWith('%')) ? siteKey : '6LePisStAAAAAMrXU7L-BBBSFm2beiH1Os17JqbA';
        
        // Define sitekey globally so React can read it
        window.recaptchaSiteKey = cleanSiteKey;

        const script = document.createElement('script');
        script.src = 'https://www.google.com/recaptcha/api.js?render=' + cleanSiteKey;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
