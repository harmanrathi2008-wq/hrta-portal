    <!-- Self-Healing Cache & Asset Sync Script -->
    <script>
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          var url = e.target.src || e.target.href;
          if (url && (url.indexOf('/assets/') > -1 || url.indexOf('main.jsx') > -1 || url.indexOf('index-') > -1)) {
            console.warn('Asset loading failed, self-healing cache: ' + url);
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                registrations.forEach(function(reg) {
                  reg.unregister();
                });
              });
            }
            if ('caches' in window) {
              caches.keys().then(function(names) {
                names.forEach(function(name) {
                  caches.delete(name);
                });
              });
            }
            
            // Show update screen instead of auto-reloading in a tight loop
            if (!document.getElementById('update-overlay')) {
              var overlay = document.createElement('div');
              overlay.id = 'update-overlay';
              overlay.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#020205;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999999;font-family:sans-serif;padding:20px;text-align:center;';
              overlay.innerHTML = '<div style="font-size:50px;margin-bottom:20px;filter:drop-shadow(0 0 15px rgba(239,68,68,0.3));">🔄</div>' +
                                  '<h2 style="color:#ef4444;margin-bottom:10px;font-weight:900;text-transform:uppercase;letter-spacing:2px;">Update Available</h2>' +
                                  '<p style="color:#94a3b8;max-width:400px;margin-bottom:24px;font-size:13px;line-height:1.6;">We have updated the portal with new security features. Click below to load the latest version.</p>' +
                                  '<button onclick="window.location.href = window.location.origin + window.location.pathname + \'?u=\' + Date.now();" style="background:linear-gradient(to right, #ef4444, #f43f5e);color:#fff;border:none;padding:14px 28px;font-weight:bold;font-size:12px;text-transform:uppercase;letter-spacing:1px;border-radius:12px;cursor:pointer;box-shadow:0 10px 15px -3px rgba(239,68,68,0.3);">Refresh Portal</button>';
              document.body.appendChild(overlay);
            }
          }
        }
      }, true);
    </script>
